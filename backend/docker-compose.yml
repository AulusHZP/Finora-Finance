services:
  db:
    image: postgres:16-alpine
    container_name: finora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: finora_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finora_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finora-auth-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://postgres:1Q3Qrlhn77oKYnLC@db.ikoacrenkbwuvcjyyudg.supabase.co:5432/postgres"
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
